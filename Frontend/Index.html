<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusicBrainz Explorer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface2: #23232f;
            --border: #2e2e3e;
            --accent: #7c6af7;
            --accent2: #e05c97;
            --text: #f0eeff;
            --muted: #8884a8;
            --green: #3ecf8e;
            --amber: #f59e0b;
            --red: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Top bar ─────────────────────────────────────── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        .logo span {
            color: var(--accent2);
        }

        .search-wrap {
            flex: 1;
            max-width: 480px;
            display: flex;
            gap: 8px;
        }

        .search-wrap input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 14px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }

        .search-wrap input::placeholder {
            color: var(--muted);
        }

        .search-wrap input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity .15s, transform .1s;
            white-space: nowrap;
        }

        .btn:hover {
            opacity: .88;
        }

        .btn:active {
            transform: scale(.97);
        }

        .btn.secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn.sm {
            padding: 5px 12px;
            font-size: 12px;
        }

        /* ── Layout ──────────────────────────────────────── */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            min-height: calc(100vh - 56px);
        }

        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .main {
            padding: 24px;
        }

        /* ── Section label ───────────────────────────────── */
        .sec-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 8px 4px 4px;
        }

        /* ── Artist card (sidebar) ───────────────────────── */
        .artist-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: border-color .15s, background .15s;
        }

        .artist-card:hover {
            border-color: var(--accent);
            background: #26263a;
        }

        .artist-card.active {
            border-color: var(--accent);
            background: #1e1c38;
        }

        .artist-card-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }

        .artist-card-meta {
            font-size: 11px;
            color: var(--muted);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 20px;
            background: #2a2640;
            color: #a89cf7;
            border: 1px solid #3d3870;
        }

        .pill.green {
            background: #0d2b1f;
            color: #3ecf8e;
            border-color: #1a4a34;
        }

        .pill.amber {
            background: #2b1f0a;
            color: #f59e0b;
            border-color: #4a3510;
        }

        .score-bar {
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            margin-top: 8px;
        }

        .score-fill {
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
        }

        /* ── Main panel sections ─────────────────────────── */
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }

        .panel-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 3px;
        }

        .meta-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tag-chip {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        /* ── Stats row ───────────────────────────────────── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .stat-val {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }

        .stat-val.accent {
            color: var(--accent);
        }

        .stat-val.green {
            color: var(--green);
        }

        /* ── Albums grid ─────────────────────────────────── */
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
        }

        .album-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color .15s, transform .15s;
        }

        .album-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .album-cover {
            width: 100%;
            aspect-ratio: 1;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .album-cover-icon {
            width: 48px;
            height: 48px;
            opacity: .25;
        }

        .album-cover-year {
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
        }

        .album-info {
            padding: 10px 12px;
        }

        .album-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .album-meta {
            font-size: 11px;
            color: var(--muted);
        }

        /* ── Release list ────────────────────────────────── */
        .release-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 12px;
        }

        .release-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
        }

        .release-row-title {
            flex: 1;
            font-weight: 500;
            color: var(--text);
        }

        .release-row-date {
            color: var(--muted);
            font-size: 12px;
        }

        .release-row-country {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--surface);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        /* ── MBID badge ──────────────────────────────────── */
        .mbid {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            cursor: pointer;
            transition: color .15s;
        }

        .mbid:hover {
            color: var(--accent);
        }

        /* ── Spinner ─────────────────────────────────────── */
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 14px;
            padding: 32px 0;
        }

        .empty {
            color: var(--muted);
            font-size: 14px;
            padding: 40px 0;
            text-align: center;
        }

        /* ── Error ───────────────────────────────────────── */
        .error-box {
            background: #2a1010;
            border: 1px solid #5a2020;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--red);
            margin-bottom: 16px;
        }

        /* ── Toast ───────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text);
            z-index: 999;
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
        }

        /* ── Modal overlay ───────────────────────────────── */
        .overlay {
            background: rgba(0, 0, 0, .7);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 80px;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            width: 100%;
            max-width: 540px;
        }

        /* ── Endpoint badge ──────────────────────────────── */
        .endpoint-badge {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 6px;
            background: #0d1f2d;
            color: #60b4f5;
            border: 1px solid #1a3a54;
        }

        .method-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
            background: #1a3a54;
            color: #60b4f5;
        }

        /* ── Request log ─────────────────────────────────── */
        .req-log {
            background: #0a0a10;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #60b4f5;
            margin-bottom: 20px;
            min-height: 32px;
            white-space: nowrap;
            overflow-x: auto;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }
    </style>
</head>

<body>

    <!-- Top bar -->
    <div class="topbar">
        <div class="logo">Music<span>Brainz</span></div>
        <div class="search-wrap">
            <input id="searchInput" type="text" placeholder="Buscar artista..." value="" />
            <button class="btn" onclick="buscarArtista()">Buscar</button>
        </div>
        <span id="serverStatus" style="font-size:12px; color: var(--muted); white-space:nowrap;">
            Servidor: <span id="statusDot" style="color:var(--amber)">●</span> conectando...
        </span>
    </div>

    <!-- Layout -->
    <div class="layout">
        <!-- Sidebar: resultados de búsqueda -->
        <div class="sidebar" id="sidebar">
            <div class="sec-label">Resultados</div>
            <div class="empty" id="sidebarEmpty">Busca un artista para comenzar</div>
        </div>

        <!-- Main panel -->
        <div class="main" id="mainPanel">
            <div class="empty" style="padding-top: 80px;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"
                    style="opacity:.25; margin-bottom:16px">
                    <circle cx="12" cy="12" r="10" />
                    <circle cx="12" cy="12" r="3" />
                    <line x1="12" y1="2" x2="12" y2="5" />
                    <line x1="12" y1="19" x2="12" y2="22" />
                    <line x1="2" y1="12" x2="5" y2="12" />
                    <line x1="19" y1="12" x2="22" y2="12" />
                </svg>
                <div>Selecciona un artista para ver sus álbumes</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
        const API = 'http://localhost:3000';
        let selectedArtist = null;
        let selectedAlbum = null;

        // ── Check server ──────────────────────────────────────────────────────────
        async function checkServer() {
            try {
                await fetch(`${API}/buscar-artista?nombre=test`);
                document.getElementById('serverStatus').innerHTML =
                    'Servidor: <span style="color:#3ecf8e">●</span> conectado';
            } catch {
                document.getElementById('serverStatus').innerHTML =
                    'Servidor: <span style="color:#f87171">●</span> sin conexión';
            }
        }
        checkServer();

        // ── Toast ─────────────────────────────────────────────────────────────────
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // ── Copy MBID ─────────────────────────────────────────────────────────────
        function copyMBID(mbid) {
            navigator.clipboard.writeText(mbid).then(() => showToast('MBID copiado'));
        }

        // ── Search ────────────────────────────────────────────────────────────────
        document.getElementById('searchInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') buscarArtista();
        });

        async function buscarArtista() {
            const nombre = document.getElementById('searchInput').value.trim();
            if (!nombre) return;

            const sidebar = document.getElementById('sidebarEmpty');
            document.getElementById('sidebar').innerHTML =
                '<div class="sec-label">Resultados</div>' +
                '<div class="loading"><div class="spinner"></div>Buscando...</div>';

            setReqLog(`GET /buscar-artista?nombre=${encodeURIComponent(nombre)}`);

            try {
                const res = await fetch(`${API}/buscar-artista?nombre=${encodeURIComponent(nombre)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                renderSidebar(data.artists || []);
            } catch (err) {
                document.getElementById('sidebar').innerHTML =
                    '<div class="sec-label">Resultados</div>' +
                    `<div class="error-box">Error: ${err.message}<br>¿Está corriendo el servidor en :3000?</div>`;
            }
        }

        function renderSidebar(artists) {
            const html = artists.length === 0
                ? '<div class="empty">Sin resultados</div>'
                : artists.map(a => `
        <div class="artist-card" onclick="selectArtist('${a.id}', this)">
          <div class="artist-card-name">${esc(a.name)}</div>
          <div class="artist-card-meta">
            ${a.type ? `<span class="pill">${esc(a.type)}</span>` : ''}
            ${a.country ? `<span class="pill green">${esc(a.country)}</span>` : ''}
            ${a['life-span']?.begin ? `<span>${a['life-span'].begin.slice(0, 4)}</span>` : ''}
          </div>
          <div class="score-bar"><div class="score-fill" style="width:${a.score || 0}%"></div></div>
        </div>`).join('');

            document.getElementById('sidebar').innerHTML =
                `<div class="sec-label">Resultados (${artists.length})</div>` + html;
        }

        // ── Select artist ─────────────────────────────────────────────────────────
        async function selectArtist(mbid, el) {
            document.querySelectorAll('.artist-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedArtist = mbid;

            document.getElementById('mainPanel').innerHTML =
                '<div class="loading"><div class="spinner"></div>Cargando artista...</div>';

            setReqLog(`GET /artista/${mbid}  +  GET /artista/${mbid}/albumes`);

            try {
                const [artistRes, albumsRes] = await Promise.all([
                    fetch(`${API}/artista/${mbid}`).then(r => r.json()),
                    fetch(`${API}/artista/${mbid}/albumes`).then(r => r.json())
                ]);
                renderArtistPanel(artistRes, albumsRes);
            } catch (err) {
                document.getElementById('mainPanel').innerHTML =
                    `<div class="error-box">Error: ${err.message}</div>`;
            }
        }

        function renderArtistPanel(artist, albumsData) {
            const albums = albumsData['release-groups'] || [];
            const tags = (artist.tags || []).sort((a, b) => b.count - a.count).slice(0, 8);
            const lifespan = artist['life-span'];
            const founded = lifespan?.begin ? lifespan.begin.slice(0, 4) : '—';
            const ended = lifespan?.ended ? (lifespan.end?.slice(0, 4) || '?') : null;

            document.getElementById('mainPanel').innerHTML = `
      <div class="req-log" id="reqLog">— listo —</div>

      <div class="panel-header">
        <div>
          <div class="panel-title">${esc(artist.name)}</div>
          <div class="panel-sub">
            ${artist.type || 'Artista'} 
            ${artist.country ? '· ' + artist.country : ''}
            ${founded !== '—' ? '· ' + founded + (ended ? ' → ' + ended : ' → presente') : ''}
          </div>
        </div>
        <span class="mbid" onclick="copyMBID('${artist.id}')" title="Click para copiar MBID">
          ${artist.id.slice(0, 8)}...
        </span>
      </div>

      ${tags.length ? `<div class="meta-row">${tags.map(t => `<span class="tag-chip">${esc(t.name)}</span>`).join('')}</div>` : ''}

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Álbumes</div>
          <div class="stat-val accent">${albumsData['release-group-count'] ?? albums.length}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Fundación</div>
          <div class="stat-val" style="font-size:16px">${founded}</div>
        </div>
        ${artist.country ? `<div class="stat"><div class="stat-label">País</div><div class="stat-val" style="font-size:16px">${esc(artist.country)}</div></div>` : ''}
        ${artist.type ? `<div class="stat"><div class="stat-label">Tipo</div><div class="stat-val" style="font-size:16px">${esc(artist.type)}</div></div>` : ''}
      </div>

      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <div style="font-size:15px; font-weight:600;">Discografía</div>
        <span class="endpoint-badge">GET /artista/${artist.id}/albumes</span>
      </div>

      <div class="albums-grid" id="albumsGrid">
        ${albums.length === 0
                    ? '<div class="empty">Sin álbumes encontrados</div>'
                    : albums.map(rg => albumCard(rg)).join('')}
      </div>
    `;
            setReqLog(`— listo —`);
        }

        function albumCard(rg) {
            const year = rg['first-release-date']?.slice(0, 4) || '';
            return `
      <div class="album-card" onclick="selectAlbum('${rg.id}', '${esc(rg.title)}', this)">
        <div class="album-cover">
          <svg class="album-cover-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2">
            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
          </svg>
          ${year ? `<span class="album-cover-year">${year}</span>` : ''}
        </div>
        <div class="album-info">
          <div class="album-title">${esc(rg.title)}</div>
          <div class="album-meta">${rg['primary-type'] || 'Álbum'}${year ? ' · ' + year : ''}</div>
        </div>
      </div>`;
        }

        // ── Select album ──────────────────────────────────────────────────────────
        async function selectAlbum(rgmbid, title, el) {
            document.querySelectorAll('.album-card').forEach(c => c.style.borderColor = '');
            el.style.borderColor = 'var(--accent)';

            setReqLog(`GET /album/${rgmbid}/releases`);

            const existing = document.getElementById('releaseSection');
            if (existing) existing.remove();

            const spinner = document.createElement('div');
            spinner.id = 'releaseSection';
            spinner.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando releases...</div>';
            document.getElementById('albumsGrid').after(spinner);

            try {
                const res = await fetch(`${API}/album/${rgmbid}/releases`);
                const data = await res.json();
                renderReleases(rgmbid, title, data.releases || []);
            } catch (err) {
                document.getElementById('releaseSection').innerHTML =
                    `<div class="error-box">Error: ${err.message}</div>`;
            }
        }

        function renderReleases(rgmbid, title, releases) {
            const section = document.getElementById('releaseSection');
            section.innerHTML = `
      <hr class="divider" />
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <div style="font-size:15px; font-weight:600;">Releases — ${esc(title)}</div>
        <span class="endpoint-badge">GET /album/${rgmbid}/releases</span>
      </div>
      <div class="release-list">
        ${releases.length === 0 ? '<div class="empty">Sin releases</div>' : releases.map(r => `
          <div class="release-row">
            <div class="release-row-title">${esc(r.title)}</div>
            ${r.date ? `<span class="release-row-date">${r.date}</span>` : ''}
            ${r.country ? `<span class="release-row-country">${esc(r.country)}</span>` : ''}
            ${r.status ? `<span class="pill ${r.status === 'Official' ? 'green' : 'amber'}">${esc(r.status)}</span>` : ''}
            <span class="mbid" onclick="copyMBID('${r.id}')" title="Copiar MBID">${r.id.slice(0, 8)}…</span>
          </div>`).join('')}
      </div>`;
            setReqLog(`— ${releases.length} releases cargados —`);
        }

        // ── Request log helper ────────────────────────────────────────────────────
        function setReqLog(text) {
            const el = document.getElementById('reqLog');
            if (el) el.textContent = '→ ' + text;
        }

        // ── Escape helper ─────────────────────────────────────────────────────────
        function esc(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
    </script>
</body>
